name: Orion Agent Guidance

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "**/AGENTS.md"
      - ".agents/**"
      - ".claude/**"
      - ".cursor/**"
      - ".codex/**"
      - ".github/instructions/**"
      - ".github/workflows/orion-agent-guidance.yml"
      - ".coderabbit.yaml"
      - "CLAUDE.md"
      - "GEMINI.md"
      - "Tools/orion_agent_guidance/**"
  push:
    paths:
      - "AGENTS.md"
      - "**/AGENTS.md"
      - ".agents/**"
      - ".claude/**"
      - ".cursor/**"
      - ".codex/**"
      - ".github/instructions/**"
      - ".github/workflows/orion-agent-guidance.yml"
      - ".coderabbit.yaml"
      - "CLAUDE.md"
      - "GEMINI.md"
      - "Tools/orion_agent_guidance/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python hooks and tooling
        run: python -m py_compile .codex/hooks/*.py Tools/orion_agent_guidance/*.py
      - name: Test command guard
        run: python -m unittest discover -s Tools/orion_agent_guidance -p "test_*.py"
      - name: Validate guidance
        run: python Tools/orion_agent_guidance/validate.py
      - name: Parse YAML adapters and workflows
        run: |
          ruby -rdate -e 'require "yaml"; (Dir[".github/workflows/*.{yml,yaml}"] + Dir[".agents/skills/*/agents/*.yaml"]).each { |p| YAML.safe_load_file(p, permitted_classes: [Date, Time], aliases: true) }; puts "YAML parse passed"'
